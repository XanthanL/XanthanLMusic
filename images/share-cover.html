<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeChat Share Cover Generator</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
    }
    canvas {
      border: 1px solid #333;
      max-width: 90vw;
      height: auto;
    }
    button {
      margin-top: 20px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #b026ff, #ff006e);
      border: none;
      border-radius: 999px;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      cursor: pointer;
    }
    p {
      margin-top: 12px;
      color: #888;
      font-size: 12px;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="cover" width="1200" height="630"></canvas>
  <button id="download">Download PNG</button>
  <p>Recommended size for WeChat / Open Graph: 1200 × 630</p>

  <script>
    const canvas = document.getElementById('cover');
    const ctx = canvas.getContext('2d');
    const W = 1200;
    const H = 630;

    // Background gradient
    const bgGradient = ctx.createLinearGradient(0, 0, W, H);
    bgGradient.addColorStop(0, '#0a0a0a');
    bgGradient.addColorStop(0.5, '#1a0a2e');
    bgGradient.addColorStop(1, '#000000');
    ctx.fillStyle = bgGradient;
    ctx.fillRect(0, 0, W, H);

    // Draw subtle stars
    for (let i = 0; i < 120; i++) {
      const x = Math.random() * W;
      const y = Math.random() * H;
      const size = Math.random() * 2 + 0.5;
      const alpha = Math.random() * 0.6 + 0.2;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.fill();
    }

    // Draw neon glow circles
    function drawGlow(x, y, radius, color) {
      const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
      gradient.addColorStop(0, color);
      gradient.addColorStop(1, 'transparent');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
    }
    drawGlow(200, 450, 300, 'rgba(176, 38, 255, 0.25)');
    drawGlow(1000, 150, 350, 'rgba(255, 0, 110, 0.2)');
    drawGlow(900, 500, 250, 'rgba(0, 212, 255, 0.15)');

    // Decorative lines
    ctx.strokeStyle = 'rgba(176, 38, 255, 0.2)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
      ctx.beginPath();
      ctx.moveTo(0, 100 + i * 90);
      ctx.lineTo(W, 80 + i * 95);
      ctx.stroke();
    }

    // Main title
    ctx.save();
    ctx.font = '900 96px Orbitron';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(176, 38, 255, 0.8)';
    ctx.shadowBlur = 40;
    ctx.fillStyle = '#fff';
    ctx.fillText('XANTHANL', W / 2, H / 2 - 40);

    // Subtitle
    ctx.font = '500 28px Orbitron';
    ctx.shadowBlur = 20;
    ctx.letterSpacing = '8px';
    ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
    ctx.fillText('ELECTRIC MIRAGE', W / 2, H / 2 + 45);
    ctx.restore();

    // Tagline
    ctx.save();
    ctx.font = '300 18px Orbitron';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.letterSpacing = '4px';
    ctx.fillText('SYNTH-POP · NEO-PSYCHEDELIC', W / 2, H / 2 + 100);
    ctx.restore();

    // Border frame
    ctx.strokeStyle = 'rgba(176, 38, 255, 0.3)';
    ctx.lineWidth = 2;
    ctx.strokeRect(30, 30, W - 60, H - 60);

    document.getElementById('download').addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'share-cover.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  </script>
</body>
</html>
